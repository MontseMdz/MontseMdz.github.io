<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <!--Estilos CSS-->
   <link rel="stylesheet" href="estilos.css">
   <!--Remixicon-->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
   <title>DevDesigner - Product List /Shopping ZAYEE</title>
</head>
<body>
  
<!--Header-->    
<header>
    <a href="#" class="logo">
        <i class="ri-store-3-line"></i>  ZAYEE STORE
    </a>
</header>

<!--Main-->
<main>

<!--Lista de Productos-->
<section class="card">

</section>

<!--Carrito-->
<section class="cart-list">
    <h2>Tu carrito (0)</h2>
    <div class="cart-list__items">
        <div class="items__img">
            <img src="imagenes/logo.png" alt="Falda">
        </div>
        <p>Tu ropa aparecera aqui</p>
    </div>
</section>

<!--Modal-->
<div class="overlay" id="overlay">
     <div class="modal-pedido" id="modal-pedido">
                <i class="ri-checkbox-circle-line"></i>
                <h2>Pedido Realizado</h2>
                <p>Esperamos que disfrutes tu ropa!</p>
               <div class="pedido__detalle">

            </div>
            <button class="btn" id="btn-close">Realiza nuevo pedido</button>
             </div>
        </div>

    </main>

<!--Script index.js-->
<script src="index.js"></script>
        
</body>
</html>
